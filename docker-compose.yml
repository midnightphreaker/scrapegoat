# Docker Compose configuration for Docs MCP Server
#
# Scaling setup with separate services:
# - postgres: PostgreSQL database for primary storage
# - worker: Handles documentation processing
# - mcp: MCP server endpoint for AI tools
# - web: Web interface for management
#
services:
  # Worker service - handles the actual documentation processing
  worker:
    image: git.phrk.org/pub/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker", "--host", "0.0.0.0", "--port", "8080"]
    container_name: scrapegoat-worker
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://docs:docs@postgres:5432/docs}
    volumes:
      - scrapegoat-data:/data
      - scrapegoat-config:/config
      - /import:/import
    healthcheck:
      test: 'node -e ''require("net").connect(8080, "127.0.0.1").on("connect",()=>process.exit(0)).on("error",()=>process.exit(1))'''
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # MCP server - provides AI tool integration endpoint
  mcp:
    image: git.phrk.org/pub/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mcp",
        "--protocol",
        "http",
        "--host",
        "0.0.0.0",
        "--port",
        "6280",
        "--server-url",
        "http://worker:8080/api",
        "--no-logo",
      ]
    container_name: scrapegoat-server
    restart: unless-stopped
    ports:
      - "6280:6280"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://docs:docs@postgres:5432/docs}
    volumes:
      - scrapegoat-config:/config
      - /import:/import
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Web interface - provides browser-based management
  web:
    image: git.phrk.org/pub/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "6281",
        "--server-url",
        "http://worker:8080/api",
        "--no-logo",
      ]
    container_name: scrapegoat-web
    restart: unless-stopped
    ports:
      - "6281:6281"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://docs:docs@postgres:5432/docs}
    volumes:
      - scrapegoat-config:/config
      - /import:/import
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  scrapegoat-data:
    name: scrapegoat-data
  scrapegoat-config:
    name: scrapegoat-config
