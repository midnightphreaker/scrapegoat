# Docker Compose configuration for ScrapeGoat (PostgreSQL)
#
# Copy .env.example to .env and configure before starting:
#   cp .env.example .env
#
# Services:
# - postgres: PostgreSQL database with pgvector extension
# - worker: Handles documentation processing
# - mcp: MCP server endpoint for AI tools
# - web: Web interface for management
#
services:
  # PostgreSQL database - primary storage backend
  postgres:
    image: pgvector/pgvector:${SCRAPEGOAT_PG_VERSION:-pg16}
    container_name: scrapegoat-postgres
    restart: unless-stopped
    ports:
      - "${SCRAPEGOAT_DB_HOST_ADDRESS:-localhost}:${SCRAPEGOAT_DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${SCRAPEGOAT_DB_USER:-scrapegoat}
      POSTGRES_PASSWORD: ${SCRAPEGOAT_DB_PASSWORD:-scrapegoat}
      POSTGRES_DB: ${SCRAPEGOAT_DB_NAME:-scrapegoat}
    volumes:
      - scrapegoat-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SCRAPEGOAT_DB_USER:-scrapegoat}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Worker service - handles the actual documentation processing
  worker:
    image: git.phrk.org/pub/scrapegoat:${SCRAPEGOAT_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker", "--host", "0.0.0.0", "--port", "8080"]
    container_name: scrapegoat-worker
    restart: unless-stopped
    ports:
      - "${SCRAPEGOAT_WORKER_HOST_ADDRESS:-localhost}:${SCRAPEGOAT_WORKER_HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SCRAPEGOAT_DB_URL: postgresql://${SCRAPEGOAT_DB_USER:-scrapegoat}:${SCRAPEGOAT_DB_PASSWORD:-scrapegoat}@postgres:5432/${SCRAPEGOAT_DB_NAME:-scrapegoat}
      # Local upload configuration (uncomment for filesystem staging mode)
      # SCRAPEGOAT_WEBUI_IMPORT_STAGING_MODE: filesystem
      # SCRAPEGOAT_WEBUI_IMPORT_STAGING_INTERNAL_PATH: /data/staging
    volumes:
      - scrapegoat-data:/data
      - scrapegoat-config:/config
      # Local upload staging volume (uncomment for filesystem staging mode)
      # - scrapegoat-staging:/data/staging
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: 'node -e ''require("net").connect(8080, "127.0.0.1").on("connect",()=>process.exit(0)).on("error",()=>process.exit(1))'''
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${SCRAPEGOAT_WORKER_MEMORY_LIMIT:-2G}
        reservations:
          memory: ${SCRAPEGOAT_WORKER_MEMORY_RESERVATION:-1G}

  # MCP server - provides AI tool integration endpoint
  mcp:
    image: git.phrk.org/pub/scrapegoat:${SCRAPEGOAT_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mcp",
        "--protocol",
        "http",
        "--host",
        "0.0.0.0",
        "--port",
        "6280",
        "--server-url",
        "http://worker:8080/api",
        "--no-logo",
      ]
    container_name: scrapegoat-mcp
    restart: unless-stopped
    ports:
      - "${SCRAPEGOAT_MCP_HOST_ADDRESS:-localhost}:${SCRAPEGOAT_MCP_HOST_PORT:-6280}:6280"
    env_file:
      - .env
    environment:
      SCRAPEGOAT_DB_URL: postgresql://${SCRAPEGOAT_DB_USER:-scrapegoat}:${SCRAPEGOAT_DB_PASSWORD:-scrapegoat}@postgres:5432/${SCRAPEGOAT_DB_NAME:-scrapegoat}
    volumes:
      - scrapegoat-config:/config
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${SCRAPEGOAT_MCP_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${SCRAPEGOAT_MCP_MEMORY_RESERVATION:-256M}

  # Web interface - provides browser-based management
  web:
    image: git.phrk.org/pub/scrapegoat:${SCRAPEGOAT_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "6281",
        "--server-url",
        "http://worker:8080/api",
        "--no-logo",
      ]
    container_name: scrapegoat-web
    restart: unless-stopped
    ports:
      - "${SCRAPEGOAT_WEB_HOST_ADDRESS:-localhost}:${SCRAPEGOAT_WEB_HOST_PORT:-6281}:6281"
    env_file:
      - .env
    environment:
      SCRAPEGOAT_DB_URL: postgresql://${SCRAPEGOAT_DB_USER:-scrapegoat}:${SCRAPEGOAT_DB_PASSWORD:-scrapegoat}@postgres:5432/${SCRAPEGOAT_DB_NAME:-scrapegoat}
      SCRAPEGOAT_HOST: "0.0.0.0"
      # Local upload configuration (uncomment for filesystem staging mode)
      # SCRAPEGOAT_WEBUI_IMPORT_STAGING_MODE: filesystem
      # SCRAPEGOAT_WEBUI_IMPORT_STAGING_INTERNAL_PATH: /data/staging
    volumes:
      - scrapegoat-config:/config
      - scrapegoat-data:/data
      # Local upload staging volume (uncomment for filesystem staging mode)
      # - scrapegoat-staging:/data/staging
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${SCRAPEGOAT_WEB_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${SCRAPEGOAT_WEB_MEMORY_RESERVATION:-256M}

volumes:
  scrapegoat-data:
    name: scrapegoat-data
  scrapegoat-config:
    name: scrapegoat-config
  scrapegoat-pgdata:
    name: scrapegoat-pgdata
  # Local upload staging volume (uncomment for filesystem staging mode)
  # scrapegoat-staging:
  #   name: scrapegoat-staging
