# Docker Compose configuration for ScrapeGoat
#
# Scaling setup with separate services:
# - postgres: PostgreSQL database for primary storage
# - worker: Handles documentation processing
# - mcp: MCP server endpoint for AI tools
# - web: Web interface for management
#
services:
  # PostgreSQL database - primary storage backend
  postgres:
    image: pgvector/pgvector:pg16
    container_name: scrapegoat-postgres
    restart: unless-stopped
    ports:
      - "10.9.9.20:5432:5432"
    environment:
      POSTGRES_USER: docs
      POSTGRES_PASSWORD: docs
      POSTGRES_DB: docs
    volumes:
      - scrapegoat-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docs"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Worker service - handles the actual documentation processing
  worker:
    image: git.phrk.org/pub/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker", "--host", "0.0.0.0", "--port", "8080"]
    container_name: scrapegoat-worker
    restart: unless-stopped
    ports:
      - "10.9.9.20:8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://docs:docs@postgres:5432/docs"
    volumes:
      - scrapegoat-data:/data
      - scrapegoat-config:/config
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: 'node -e ''require("net").connect(8080, "127.0.0.1").on("connect",()=>process.exit(0)).on("error",()=>process.exit(1))'''
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # MCP server - provides AI tool integration endpoint
  mcp:
    image: git.phrk.org/pub/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mcp",
        "--protocol",
        "http",
        "--host",
        "0.0.0.0",
        "--port",
        "6280",
        "--server-url",
        "http://worker:8080/api",
        "--no-logo",
      ]
    container_name: scrapegoat-mcp
    restart: unless-stopped
    ports:
      - "10.9.9.20:6280:6280"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://docs:docs@postgres:5432/docs"
    volumes:
      - scrapegoat-config:/config
    depends_on:
      worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Web interface - provides browser-based management
  web:
    image: git.phrk.org/pub/scrapegoat:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      ["web", "--host", "0.0.0.0", "--port", "6281", "--no-logo"]
    container_name: scrapegoat-web
    restart: unless-stopped
    ports:
      - "10.9.9.20:6281:6281"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://docs:docs@postgres:5432/docs"
      SCRAPEGOAT_HOST: "0.0.0.0"
    volumes:
      - scrapegoat-config:/config
      - scrapegoat-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  scrapegoat-data:
    name: scrapegoat-data
  scrapegoat-config:
    name: scrapegoat-config
  scrapegoat-pgdata:
    name: scrapegoat-pgdata
