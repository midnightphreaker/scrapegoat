version: '3.8'

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: scrapegoat-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      # Performance tuning for test environment
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5433:5432"  # Non-standard port to avoid conflicts with production PostgreSQL
    volumes:
      # Use tmpfs for better test performance (data stored in memory)
      - type: tmpfs
        target: /var/lib/postgresql/data
        tmpfs:
          size: 1G
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "log_statement=none"  # Reduce logging in tests
      - "-c"
      - "fsync=off"  # Faster writes in test environment (safe since tmpfs)
      - "-c"
      - "synchronous_commit=off"  # Faster commits in test environment
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
