name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: docker
    steps:
      - name: Checkout
        run: |
          echo "=== CHECKOUT START ==="
          git clone https://gitbot:6765434e2da6214fb260db6c3d192554ae7dc536@git.phrk.org/pub/scrapegoat.git .
          git checkout ${{ github.sha }}
          echo "=== CHECKOUT DONE ==="

      - name: Setup Node.js
        run: |
          echo "=== NODE.JS SETUP START ==="
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs
          node --version
          echo "=== NODE.JS SETUP DONE ==="

      - name: Install dependencies
        run: |
          echo "=== NPM CI START ==="
          npm ci || npm install
          echo "=== NPM CI DONE ==="

      - name: Build
        run: |
          echo "=== BUILD START ==="
          npm run build
          echo "=== BUILD DONE ==="

      - name: Package
        run: |
          echo "=== PACKAGE START ==="
          mkdir -p dist
          tar -czf dist/scrapegoat-${{ github.ref_name }}.tar.gz dist
          ls -la dist/
          echo "=== PACKAGE DONE ==="

      - name: Create Release
        run: |
          echo "=== CREATE RELEASE START ==="
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PHRK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\", \"name\": \"Release ${{ github.ref_name }}\", \"body\": \"MCP server release\"}" \
            https://git.phrk.org/api/v1/repos/pub/scrapegoat/releases
          echo "=== CREATE RELEASE DONE ==="
