name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: docker
    steps:
      - name: Checkout
        run: |
          echo "Cloning repo..."
          git clone https://gitbot:6765434e2da6214fb260db6c3d192554ae7dc536@git.phrk.org/pub/scrapegoat.git .
          echo "Checking out SHA..."
          git checkout ${{ github.sha }}
          echo "Clone complete"
          ls -la

      - name: Setup Node.js
        run: |
          echo "Setting up Node.js..."
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs
          node --version

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      - name: Build
        run: |
          echo "Building..."
          npm run build

      - name: Package
        run: |
          echo "Packaging..."
          mkdir -p dist
          tar -czf dist/scrapegoat-${{ github.ref_name }}.tar.gz dist
          ls -la dist/

      - name: Create Release
        run: |
          echo "Creating release..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PHRK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\", \"name\": \"Release ${{ github.ref_name }}\", \"body\": \"MCP server release\"}" \
            https://git.phrk.org/api/v1/repos/pub/scrapegoat/releases
          echo "Done"
